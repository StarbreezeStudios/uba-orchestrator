services:
  uba-orchestrator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: uba-orchestrator:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    init: true
    stop_grace_period: 10s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=2)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
